<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Band Tools — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 20px; margin-bottom: 24px; color: #1a73e8; }
    .group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #444; }
    input, select { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 4px; }
    .hint { font-size: 12px; color: #888; margin-top: 2px; }
    button { padding: 8px 20px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #1557b0; }
    #status { margin-top: 10px; color: #1e7e34; font-weight: 600; }
    #load-dropdowns { background: #f1f3f4; color: #333; margin-bottom: 12px; }
    #load-dropdowns:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <h1>Band Tools Settings</h1>

  <div class="group">
    <label for="opt-band">Default Band Number</label>
    <input type="number" id="opt-band" placeholder="87436335">
    <div class="hint">Found in your band.us URL: band.us/band/<strong>87436335</strong>/…</div>
    <button id="load-dropdowns">Load Calendars &amp; Groups</button>
  </div>

  <div class="group">
    <label for="opt-calendar">Default Calendar</label>
    <select id="opt-calendar"><option value="">— enter band number above —</option></select>
  </div>

  <div class="group">
    <label for="opt-group">Default Group (for Sync Group)</label>
    <select id="opt-group"><option value="">— enter band number above —</option></select>
  </div>

  <div class="group">
    <label for="opt-week-days">Band Week: default days</label>
    <input type="number" id="opt-week-days" value="7" min="1" max="365">
  </div>

  <div class="group">
    <label for="opt-sync-days">Sync Group: default window (days)</label>
    <input type="number" id="opt-sync-days" value="120" min="1" max="730">
  </div>

  <button id="save-btn">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
