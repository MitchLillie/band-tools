name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # Run on every PR and on every push to main. Skip on tag pushes — the
    # tag points at a commit that already passed `test` when its release
    # PR was opened, and re-running the e2e suite just slows down the
    # publish.
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/extension.spec.js

  deploy-chrome:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on:
    #   - workflow_dispatch (manual run)
    #   - push of a v* tag (created by release-please when a release PR is merged)
    # This prevents deploys on every feature/fix merge to main; those go
    # through the release-please bot, which opens a release PR, and the
    # actual publish happens when the release PR's tag is created.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run package:chrome
      - name: Upload and publish to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          npx chrome-webstore-upload publish \
            --source "band-tools-chrome-${VERSION}.zip" \
            --extension-id "$EXTENSION_ID"

  deploy-firefox:
    name: Sign and publish to AMO
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Sign via AMO API
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir dist/firefox \
            --artifacts-dir dist/firefox-signed \
            --upload-source \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"
      - name: Upload signed .xpi as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-signed
          path: dist/firefox-signed/
          if-no-files-found: error
