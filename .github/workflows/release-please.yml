name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
      # If a release PR was opened or updated, surface it in the Actions UI.
      - if: steps.release.outputs.pr != ''
        run: |
          echo "Release PR: ${{ steps.release.outputs.pr }}"
          echo "Release tag: ${{ steps.release.outputs.tag_name }}"
